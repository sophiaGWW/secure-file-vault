server:
  port: ${PORT:8080}

spring:
  application:
    name: secure-file-vault
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  datasource:
    url: "${DB_URL:jdbc:mysql://secure-file-vault-dev.chuq064e0cy4.ap-northeast-1.rds.amazonaws.com:3306/secure_file_vault?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}"
    username: "${DB_USERNAME:admin}"
    password: "${DB_PASSWORD:password}"
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis:
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: "${JWT_SECRET:dev-only-change-me-secure-file-vault-jwt-secret-please-override}"
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
  cors:
    allowed-origins: "${CORS_ALLOWED_ORIGINS:http://localhost:5173}"

aws:
  region: "${AWS_REGION:ap-northeast-1}"
  s3:
    bucket: "${AWS_S3_BUCKET:secure-file-vault-dev-sophia-20260502}"
    multipart-upload-threshold: 100MB
    multipart-part-size: 16MB
